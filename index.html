<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CatFacts Website</title>
    <link rel="stylesheet" href="src/css/main.css">
</head>
<body>

    <!-- HEADER (loaded from partial) -->
    <div id="site-header"></div>

    <!-- MAIN CONTENT -->
    <main>

        <!-- LEFT: Image Section (coverflow carousel) -->
        <div class="image-section">
            <div class="cat-image" id="carousel">
                <!-- Coverflow carousel will be built here by JavaScript -->
                <div class="coverflow" id="coverflow"></div>
            </div>
        </div>

        <!-- RIGHT: Info Section -->
        <div class="fact-section" id="info-panel">
            <h2 id="info-title">Welcome to CatFacts</h2>
            <p id="cat-fact">Loading a cat fact for you...</p>

            <!-- Subscribe Popup -->
            <div class="popup" id="subscribe-popup">
                <button class="close-btn" id="popup-close">X</button>
                <p class="popup-lead">Subscribe to our newsletter for daily cat facts and beautiful cat photos.</p>
                <div class="subscribe-form">
                    <input type="email" id="subscribe-email" placeholder="Your email address">
                    <button id="subscribe-btn">Subscribe</button>
                </div>
            </div>

            <button id="open-subscribe" class="cta-primary">Subscribe</button>
        </div>

    </main>

    <!-- FOOTER (loaded from partial) -->
    <div id="site-footer"></div>

    <script src="src/js/main.js"></script>
</body>
</html>
