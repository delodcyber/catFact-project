<!DOCTYPE html>

<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Explore Cats | Cat Facts</title>
<link rel="stylesheet" href="../css/explore-cats.css">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

</head>

<body>
    <!-- HEADER (loaded from partial) -->
    <div id="site-header"></div>

<main>
    <section class="hero">
    <h1>Explore Amazing Cats</h1>
    <p>
        Discover beautiful cat photos, learn fascinating facts,
        and find your next favorite breed.
    </p>

    <button id="discover-btn">
        Discover New Cats
    </button>
    </section>

    <section class="featured-cat">
        <div class="cat-image-container">
            <img
                id="cat-image"
                src="https://cdn2.thecatapi.com/images/MTY3ODIyMQ.jpg"
                alt="Random Cat">
        </div>

        <div class="cat-fact-container">
            <h2>Cat Fact</h2>

            <p id="cat-fact">
                Cats can rotate their ears 180 degrees.
            </p>
        </div>
    </section>

    <section class="gallery-section">

        <div class="section-heading">
            <h2>Cat Gallery</h2>
            <p>Random cat images from around the world.</p>
        </div>

        <div id="gallery" class="gallery">

        </div>

    </section>
</main>

</body>
</html>
